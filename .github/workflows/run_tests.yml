name: IDC Health Monitor
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: 30 7 * * *

permissions:
  contents: write

jobs:
  run-tests:
   runs-on: ubuntu-latest
   steps:
    - uses: actions/checkout@v6
    - name: Set up python
      uses: actions/setup-python@v6
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-cloud-bigquery google-auth

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT}}'

    - name: Run tests
      id: tests
      continue-on-error: true
      env:
        PROJECT_ID: ${{ secrets.PROJECT_ID }}
      run: |
        set -o pipefail
        python scripts/run_tests_json.py --output test_results.json 2>&1 | tee test_output.txt

    - name: Add test results to summary
      if: always()
      run: |
        echo '## Test Results' >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat test_output.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY

    - name: Update dashboard data
      if: always()
      run: |
        python -c "
        import json
        with open('docs/data/results.json', 'r') as f:
            data = json.load(f)
        with open('test_results.json', 'r') as f:
            new_result = json.load(f)
        data.append(new_result)
        data = data[-90:]
        with open('docs/data/results.json', 'w') as f:
            json.dump(data, f, indent=2)
        "
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/data/results.json
        git commit -m "Update test results [skip ci]" || echo "No changes to commit"
        git push

    - name: Fail if tests failed
      if: steps.tests.outcome == 'failure'
      run: exit 1

name: IDC Health Monitor
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    - cron: 30 7 * * *

jobs:
  run-tests:
   runs-on: ubuntu-latest
   steps:
    - uses: actions/checkout@v4
    - name: Set up python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests google-cloud-bigquery google-auth

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT}}'

    - name: Run tests
      env:
        PROJECT_ID: ${{ secrets.PROJECT_ID }}
      run: |
        set -o pipefail
        python -m unittest -v tests/idc_tests.py tests/test_dicomweb.py 2>&1 | tee test_output.txt

    - name: Add test results to summary
      if: always()
      run: |
        echo '## Test Results' >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat test_output.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
